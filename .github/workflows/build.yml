name: Build APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      with:
        packages: 'ndk;26.1.10909125'

    - name: Setup Gradle
      uses: gradle/gradle-build-action@v3
      with:
        cache-disabled: true

    - name: Build Debug APK
      run: |
        chmod +x gradlew
        ./gradlew assembleLeanbackArm64_v8aDebug assembleMobileArm64_v8aDebug --no-daemon

    - name: Upload APK (Leanback)
      uses: actions/upload-artifact@v4
      with:
        name: app-leanback-arm64-v8a
        path: app/build/outputs/apk/leanback/arm64_v8a/debug/*.apk

    - name: Upload APK (Mobile)
      uses: actions/upload-artifact@v4
      with:
        name: app-mobile-arm64-v8a
        path: app/build/outputs/apk/mobile/arm64_v8a/debug/*.apk
